name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "bin/**"
      - "skill/**"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # npm >= 11.5.1 is required for OIDC Trusted Publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Check whether this version is already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Query the exact-version document directly (more current than `npm view`).
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/$NAME/$VERSION")
          if [ "$CODE" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already published — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION not on npm (HTTP $CODE) — will publish."
          fi

      # Auth is via npm Trusted Publishing (OIDC) — no token. The repo must be
      # bound as a trusted publisher for @yukioa2z/visa-apply on npmjs.com,
      # with workflow ".github/workflows/publish.yml" on branch main.
      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "Skipped: version ${{ steps.check.outputs.version }} already published." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Published version ${{ steps.check.outputs.version }}." >> "$GITHUB_STEP_SUMMARY"
          fi
