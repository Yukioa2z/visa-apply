name: Visa policy source checks

on:
  push:
    paths:
      - "skill/references/**"
      - "skill/scripts/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/source-check.yml"
  pull_request:
    paths:
      - "skill/references/**"
      - "skill/scripts/**"
      - "scripts/**"
      - "tests/**"
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate registries (schema, roles, last_verified, ISO2 consistency)
        run: python3 skill/scripts/source_registry.py validate
      - name: Test policy source monitor
        run: python3 -m unittest discover -s tests -p "test_*.py"

  check-urls:
    # Manual liveness-only run. Policy research and releases are maintained by
    # the Codex automation rather than inferred from URL responses.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Probe seed source URLs
        run: python3 skill/scripts/source_registry.py check-urls
